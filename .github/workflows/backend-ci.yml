name: backend-ci

# Lint + build + test cho backend trên mỗi PR (và push master).
# Go: matrix động theo từng module (mỗi service 1 go.mod). Java: issue-service (Maven).
# Proto: buf lint. Mỗi module build ở "module mode" (GOWORK=off) như CI/prod thật.
on:
  workflow_dispatch: {}   # cho phép chạy tay (dùng cho E2E)
  pull_request:
    paths:
      - "services/**"
      - "packages/**"
      - "proto/**"
      - "go.work"
      - "go.work.sum"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [master]

# Hủy run cũ khi có commit mới trên cùng ref (tiết kiệm CI).
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Phát hiện động các Go module (mỗi thư mục có go.mod) → matrix ──────────
  discover:
    name: Discover Go modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.list.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          modules=$(find services packages -maxdepth 2 -name go.mod \
            | sed 's#/go.mod$##' | sort | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "modules=$modules" >> "$GITHUB_OUTPUT"
          echo "Discovered modules: $modules"

  # ── Go: gofmt + vet + build + test cho từng module ────────────────────────
  go:
    name: Go · ${{ matrix.module }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    env:
      GOWORK: "off" # build module-mode qua replace directive của go.mod (như prod)
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: gofmt (bỏ qua *.pb.go sinh tự động)
        run: |
          bad=$(gofmt -l . | { grep -v -E '\.pb\.go$' || true; })
          if [ -n "$bad" ]; then
            echo "::error::Các file chưa gofmt:"; echo "$bad"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race ./...

  # ── golangci-lint (advisory: chưa chặn merge, chỉ báo — bật blocking sau) ──
  golangci:
    name: golangci-lint · ${{ matrix.module }}
    needs: discover
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.discover.outputs.modules) }}
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2 # v1 (ổn định với action@v6); v2 cần action@v7 + config v2
          working-directory: ${{ matrix.module }}
          args: --timeout=5m

  # ── Proto: buf lint ───────────────────────────────────────────────────────
  proto:
    name: Proto · buf lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: buf lint
        working-directory: proto
        run: buf lint

  # ── Java: issue-service (build + test, Testcontainers khi có test) ─────────
  java:
    name: Java · issue-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      # protobuf-maven-plugin tự sinh Java từ ../../proto (đã có sẵn trong checkout)
      # + tải protoc. verify = compile + test (chưa có test → chỉ build/package).
      - name: mvn verify
        run: mvn -B -ntp -f services/issue/pom.xml verify

  # ── E2E smoke: auth + workspace + page + file + gateway trên infra thật ───
  # Chạy trên runner GitHub (docker ỔN ĐỊNH), KHÔNG cần Docker Desktop máy dev.
  # Hạ tầng (postgres/kafka/minio) khởi bằng chính docker-compose của repo; các service
  # Go chạy trên runner (go run) rồi curl qua gateway — đúng như smoke script local.
  e2e:
    name: E2E · page + file (smoke)
    # E2E đầy đủ (nhiều service + Kafka) ĐẮT + Kafka-projection timing flaky trên CI →
    # chỉ chạy TAY (workflow_dispatch), không gate mỗi PR. CI thường dùng integration test/unit.
    if: github.event_name == 'workflow_dispatch'
    needs: [go]
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/auth/go.mod
          cache-dependency-path: services/auth/go.sum
      - name: Start infra (postgres + kafka + minio)
        run: docker compose -f infra/dev/docker-compose.yml up -d postgres kafka minio
      - name: Wait for postgres + kafka
        run: |
          for i in $(seq 1 60); do
            if docker exec pm-postgres pg_isready -U postgres -d pmdb >/dev/null 2>&1 \
               && nc -z localhost 9094; then echo "infra ready"; exit 0; fi
            sleep 3
          done
          echo "infra không sẵn sàng sau 180s"; docker ps; exit 1
      - name: Apply migrations (auth, workspace, page, file)
        run: |
          set -e
          for f in services/auth/migrations/*.up.sql \
                   services/workspace/migrations/*.up.sql \
                   services/page/migrations/*.up.sql \
                   services/file/migrations/*.up.sql; do
            echo "== applying $f =="
            docker exec -i -e PGPASSWORD=postgres pm-postgres \
              psql -U postgres -d pmdb -v ON_ERROR_STOP=1 < "$f"
          done
      - name: Page E2E (register→workspace→space→page→hierarchy)
        run: bash scripts/page-integration-smoke.sh
      - name: File E2E (upload→download→delete via MinIO)
        run: bash scripts/file-integration-smoke.sh
      - name: Dump logs on failure
        if: failure()
        run: docker ps -a && docker logs pm-kafka 2>&1 | tail -30
